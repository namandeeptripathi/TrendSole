# ==========================================
# Production Configuration (Render Fallback)
# ==========================================

# Database: Use in-memory H2 database
spring.datasource.url=jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JPA / Hibernate Configuration (Fast Schema Creation)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# JPA Performance & Batching Settings
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Spring Data JPA Deferred Bootstrap Mode (Initializes repositories off critical boot path)
spring.data.jpa.repositories.bootstrap-mode=deferred

# Global Lazy Initialization
spring.main.lazy-initialization=true

# HikariCP Connection Pool Sizing for Fast Container Startup
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=-1

# Disable running schema.sql (because it contains CREATE DATABASE/USE which H2 doesn't support)
# Our DatabaseSeeder.java handles seeding mock products programmatically.
spring.sql.init.mode=never
