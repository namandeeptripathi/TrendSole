# ========================
# TrendSole Application Configuration
# ========================

# Server will run on port 8080 (default)
server.port=8080

# ========================
# MySQL Database Configuration
# ========================
# Connection URL: connects to a MySQL database named 'ecommerce_db' with batching enabled
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?rewriteBatchedStatements=true&elideSetAutoCommits=true&useSSL=false

# Your MySQL username (change if different)
spring.datasource.username=root

# Your MySQL password (change to your actual password)
spring.datasource.password=aman2341

# MySQL driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate Configuration
# ========================
# 'update' means Hibernate will automatically create/update tables based on our entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true

# Format the SQL queries so they are easy to read
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we are using MySQL 8 dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable OSIV & enable JDBC batching for performance
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Spring Data JPA Deferred Bootstrap Mode
spring.data.jpa.repositories.bootstrap-mode=deferred

# HikariCP Connection Pool Tuning
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.initialization-fail-timeout=-1

# ========================
# Application Name
# ========================
spring.application.name=TrendSole

# ========================
# Company Configuration
# ========================
trendsole.company.name=TrendSole
trendsole.company.email=trendsole.business@gmail.com
trendsole.company.website=https://trendsole.com
trendsole.company.phone=
trendsole.company.address=
